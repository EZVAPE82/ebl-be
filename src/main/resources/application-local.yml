spring:
  datasource:
    url: jdbc:h2:mem:elfbarlounge;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: false   # local: H2 + JPA create-drop으로 빠르게

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework.security: INFO
    com.elfbarlounge: DEBUG
    org.hibernate.SQL: DEBUG
