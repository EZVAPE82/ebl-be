# 다른 프로젝트와 포트 충돌 회피용 — local 전용. prod 는 8080 유지.
server:
  port: 8090

spring:
  datasource:
    url: jdbc:h2:mem:elfbarlounge;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

# 로컬 전용 JWT secret — prod에선 사용 X. local 프로파일 동작용 32바이트 fallback.
app:
  security:
    jwt:
      secret: ${JWT_SECRET:local_dev_secret_at_least_32_bytes_long_DO_NOT_USE_IN_PROD_xxxx}

  flyway:
    enabled: false   # local: H2 + JPA create-drop으로 빠르게

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    # JPA가 스키마 만든 뒤 data-local.sql 실행되도록 지연
    defer-datasource-initialization: true

  # local 전용 더미 시드. data.sql 은 local profile 에서만 mode:always 로 실행.
  # prod 에는 파일이 있어도 spring.sql.init 설정이 없어 무시됨.
  sql:
    init:
      mode: always
      encoding: UTF-8

logging:
  level:
    org.springframework.security: INFO
    com.elfbarlounge: DEBUG
    org.hibernate.SQL: DEBUG
