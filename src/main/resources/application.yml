spring:
  application:
    name: elfbarlounge-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: Asia/Seoul

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 60MB  # 후기 5 장 + 폼 데이터 여유

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

app:
  security:
    jwt:
      # 기본값 없음 — 프로파일별 yml에서 별도 설정. prod에서 미주입 시 부팅 실패가 정상.
      secret: ${JWT_SECRET:}
      access-expiry-min: ${JWT_ACCESS_EXPIRY_MIN:30}
      refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:14}
    cors:
      # local 기본 프론트 포트는 3030 (포트 충돌 회피). 3000 도 호환 위해 허용.
      # prod 는 CORS_ALLOWED_ORIGINS 환경변수로 운영 도메인 주입.
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3030,http://localhost:3000}

  # 이미지 저장소 — 사용자 업로드 사진 (후기/프로필 등)
  # mode=local: 로컬 파일시스템 (개발/초기 운영). 컨테이너 볼륨 마운트 필요.
  # mode=s3:    AWS S3 (운영 권장, CloudFront CDN 연동). 향후 별도 작업.
  image:
    mode: ${IMAGE_STORAGE_MODE:local}
    local-path: ${IMAGE_LOCAL_PATH:./uploads}
    public-base-url: ${IMAGE_PUBLIC_BASE_URL:/uploads}

  # 외부 연동 토글 — 무니코틴 전환 시 enabled=true + 키 주입으로 즉시 활성화
  integrations:
    naver-login:
      enabled: ${NAVER_LOGIN_ENABLED:false}
      client-id: ${NAVER_LOGIN_CLIENT_ID:}
      client-secret: ${NAVER_LOGIN_CLIENT_SECRET:}
    naver-commerce:
      enabled: ${NAVER_COMMERCE_ENABLED:false}
      client-id: ${NAVER_COMMERCE_CLIENT_ID:}
      client-secret: ${NAVER_COMMERCE_CLIENT_SECRET:}
    eleven-openapi:
      enabled: ${ELEVEN_OPENAPI_ENABLED:false}
      client-id: ${ELEVEN_OPENAPI_KEY:}
      client-secret: ""
