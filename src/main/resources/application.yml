spring:
  application:
    name: elfbarlounge-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: Asia/Seoul

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

app:
  security:
    jwt:
      secret: ${JWT_SECRET:CHANGE_ME_LOCAL_ONLY_NEVER_USE_IN_PROD_____________________}
      access-expiry-min: ${JWT_ACCESS_EXPIRY_MIN:30}
      refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:14}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
