spring:
  application:
    name: elfbarlounge-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: Asia/Seoul

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

app:
  security:
    jwt:
      # 기본값 없음 — 프로파일별 yml에서 별도 설정. prod에서 미주입 시 부팅 실패가 정상.
      secret: ${JWT_SECRET:}
      access-expiry-min: ${JWT_ACCESS_EXPIRY_MIN:30}
      refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:14}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  # 외부 연동 토글 — 무니코틴 전환 시 enabled=true + 키 주입으로 즉시 활성화
  integrations:
    naver-login:
      enabled: ${NAVER_LOGIN_ENABLED:false}
      client-id: ${NAVER_LOGIN_CLIENT_ID:}
      client-secret: ${NAVER_LOGIN_CLIENT_SECRET:}
    naver-commerce:
      enabled: ${NAVER_COMMERCE_ENABLED:false}
      client-id: ${NAVER_COMMERCE_CLIENT_ID:}
      client-secret: ${NAVER_COMMERCE_CLIENT_SECRET:}
    eleven-openapi:
      enabled: ${ELEVEN_OPENAPI_ENABLED:false}
      client-id: ${ELEVEN_OPENAPI_KEY:}
      client-secret: ""
